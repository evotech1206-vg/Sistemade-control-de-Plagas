<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Monitoreo de Campo v2.0</title>
  <!-- Enlace al archivo CSS para estilos personalizados -->
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
  <header class="header">
    <!-- Encabezado principal con el título del sistema de monitoreo -->
    <h2 class="header-title">Monitoreo de Campo</h2>
  </header>

  <main class="form-content">
    <form id="formMonitoreo" class="main-grid">
      <!-- Campos de entrada para Turno, Lote, N° Parada y Estado fenológico -->
      <div class="header-left">
        <div class="campo-turno">
          <label for="turno">Turno</label>
          <input type="text" id="turno" placeholder="Ej: T-11" required />
        </div>
        <div class="campo-lote">
          <label for="lote">Lote</label>
          <input type="text" id="lote" placeholder="Ej: 23A" required />
        </div>
        <div class="campo-parada">
          <span class="label-parada">N° Parada</span>
          <span class="badge-parada" id="paradaDisplay">1</span>
        </div>

        <div class="campo-fenologia">
          <label for="estadoFenologico">Estado fenológico</label>
          <select id="estadoFenologico" required>
            <option value="" disabled selected>--Selecciona Fenologia--</option>
            <option value="brotacion">Brotación</option>
            <option value="crecimiento">Crecimiento vegetativo</option>
            <option value="floracion">Floración</option>
            <option value="fructificacion">Fructificación</option>
            <option value="maduracion">Maduración</option>
          </select>
        </div>
      </div>

      <section class="card fenologia">
        <!-- Sección de Fenología con campos para Brotes, Terminales, Ramas nuevas, Flores y Frutos -->
        <div class="card-header" data-target="bodyFenologia">
          <h3 class="card-title">Fenología</h3>
          <span class="icon-arrow">▼</span>
        </div>
        <div class="card-body fenologia-grid" id="bodyFenologia">
          <div class="item">
            <label for="brotes">Brotes</label>
            <input type="number" id="brotes" value="0" min="0" step="1" />
          </div>
          <div class="item">
            <label for="terminales">Terminales</label>
            <input type="number" id="terminales" value="0" min="0" step="1" />
          </div>
          <div class="item">
            <label for="ramas-nuevas">Ramas nuevas</label>
            <input type="number" id="ramas-nuevas" value="0" min="0" step="1" />
          </div>
          <div class="item">
            <label for="flores">Flores</label>
            <input type="number" id="flores" value="0" min="0" step="1" />
          </div>
          <div class="item">
            <label for="frutos">Frutos</label>
            <input type="number" id="frutos" value="0" min="0" step="1" />
          </div>
        </div>
      </section>

      <section class="card plaga">
        <!-- Sección de Plaga con campos para Chloridea virescens -->
        <div class="card-header" data-target="bodyPlaga">
          <h3 class="card-title">Chloridea virescens</h3>
          <span class="icon-arrow">▼</span>
        </div>
        <div class="card-body plaga-grid" id="bodyPlaga">
          <div class="item">
            <label for="posturas">N° Posturas / planta</label>
            <input type="number" id="posturas" value="0" min="0" step="1" />
          </div>
          <div class="item">
            <label for="larvas">N° Larvas / planta</label>
            <input type="number" id="larvas" value="0" min="0" step="1" />
          </div>
          <div class="item">
            <label for="brotes-danados">N° Brotes dañados</label>
            <input type="number" id="brotes-danados" value="0" min="0" step="1" />
          </div>
          <div class="item">
            <label for="terminales-danados">N° Terminales dañados</label>
            <input type="number" id="terminales-danados" value="0" min="0" step="1" />
          </div>
          <div class="item">
            <label for="ramas-nuevas-danados">N° Ramas nuevas dañados</label>
            <input type="number" id="ramas-nuevas-danados" value="0" min="0" step="1" />
          </div>
          <div class="item">
            <label for="racimo-floral-posturas">Racimo Floral - N° Posturas</label>
            <input type="number" id="racimo-floral-posturas" value="0" min="0" step="1" />
          </div>
          <div class="item">
            <label for="racimo-floral-larvas">Racimo Floral - N° Larvas</label>
            <input type="number" id="racimo-floral-larvas" value="0" min="0" step="1" />
          </div>
          <div class="item">
            <label for="frutos-posturas">Frutos - N° Posturas</label>
            <input type="number" id="frutos-posturas" value="0" min="0" step="1" />
          </div>
          <div class="item">
            <label for="frutos-larvas">Frutos - N° Larvas</label>
            <input type="number" id="frutos-larvas" value="0" min="0" step="1" />
          </div>
        </div>
      </section>
      <!-- Sección de Mosca Blanca con campos para Adultos, Ninfas y Huevos -->
      <section class="card mosca-blanca">
        <div class="card-header" data-target="bodymosca-blanca">
          <h3 class="card-title">Mosca Blanca</h3>
          <span class="icon-arrow">▼</span>
        </div>
        <div class="card-body mosca-grid" id="bodymosca-blanca">
          <div class="item">
            <label for="adultos-planta">N° Ind. Adultos / planta</label>
            <input type="number" id="adultos-planta" value="0" min="0" step="0.1" />
          </div>
          <div class="item">
            <label for="ninfas-hoja">N° Ind. Ninfas / hoja</label>
            <input type="number" id="ninfas-hoja" value="0" min="0" step="0.1" />
          </div>
          <div class="item">
            <label for="huevos-hoja">N° Huevos / hoja</label>
            <input type="number" id="huevos-hoja" value="0" min="0" step="1" />
          </div>
        </div>
      </section>
      <section class="card panel-resumen">
        <div class="card-header">
          <h3 class="card-title">Resumen del Lote Actual</h3>
        </div>
        <div class="card-body resumen-grid" style="
              display: flex;
              justify-content: space-around;
              text-align: center;
            ">
          <div>
            <p style="font-size: 0.9rem; font-weight: 600; color: #555555">
              Plantas Evaluadas
            </p>
            <span id="totalEvaluadas" style="font-size: 1.8rem; font-weight: 700; color: #1b4332">0</span>
          </div>
          <div>
            <p style="font-size: 0.9rem; font-weight: 600; color: #555555">
              % Infestación
            </p>
            <span id="porcentajeInfestacion" style="font-size: 1.8rem; font-weight: 700; color: #d90429">0%</span>
          </div>
        </div>
      </section>
      <!-- Botón para guardar el registro -->

      <div class="acciones">
        <button type="submit" class="btn-guardar">GUARDAR REGISTRO</button>
      </div>
      
    </form>
  </main>
  <!-- Pie de página con información de derechos de autor -->

  <footer class="footer">
    <span>© 2026 · Monitoreo Integrado Agrícola Enterprise</span>
  </footer>
  <!-- Enlace al archivo JavaScript para la lógica de la aplicación -->

  <script src="../js/monitoreo.js"></script>
</body>

</html>
